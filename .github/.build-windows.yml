name: Build Windows executable

# Produces a self-contained CrudeWatch.exe (no Python/Docker needed on the
# target machine). Data is baked in, so the repo used here must contain
# data/raw_files.xlsx (keep the repo private if that data is sensitive).

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[app,build]"

      - name: Pre-build parquet cache (bakes data for instant startup)
        run: python scripts/prebuild_cache.py

      - name: Build executable
        run: pyinstaller CrudeWatch.spec --noconfirm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CrudeWatch-windows
          path: dist/CrudeWatch.exe
          if-no-files-found: error
